services:
  mysql:
    image: mysql:8.4
    container_name: ecom-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - ecom-net

  backend:
    # REPLACED 'build' WITH YOUR DOCKER HUB IMAGE
    image: tarun234/e-commerce-app-backend:latest
    container_name: ecom-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - ecom-net

  frontend:
    # REPLACED 'build' WITH YOUR DOCKER HUB IMAGE
    image: tarun234/e-commerce-app-frontend:latest
    container_name: ecom-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - ecom-net

networks:
  ecom-net:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads: