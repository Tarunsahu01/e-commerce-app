services:
  mysql:
    image: mysql:8.4
    container_name: ecom-mysql
    environment:
      # THE DATABASE PASSWORD (as requested)
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_db
    ports:
      # [HOST PORT] : [CONTAINER PORT]
      # Using 3307 locally to avoid conflicts with other MySQL installs
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Note: uses the password 'root' inside the check
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - ecom-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ecom-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # DATABASE CONNECTION
      # mysql:3306 uses the service name and internal container port
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecommerce_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      
      # CORS SETTINGS
      # Tells Spring Security to allow requests from your browser's frontend tab
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - ecom-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecom-frontend
    depends_on:
      - backend
    ports:
      # The browser URL will be http://localhost:3000
      - "3000:80"
    networks:
      - ecom-net

networks:
  ecom-net:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads: