spring.application.name = e-commerce-app

# --- Database configuration (local development) ---
# Adjust these values using environment variables or a local-only DB.
spring.datasource.url = jdbc:mysql://localhost:3306/ecommerce_db
spring.datasource.username = root
spring.datasource.password = root

spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql = true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- Outbound email (optional) ---
# For production, DO NOT hardcode real credentials here.
# Instead, configure via environment variables or an external config.
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your-email@example.com
#spring.mail.password=your-app-password
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# --- Stripe / payment configuration (optional) ---
# Never commit real API keys. Use environment variables instead.
#stripe.secretKey=${STRIPE_SECRET_KEY:sk_test_placeholder}

